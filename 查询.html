<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>固定账号记录系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", Arial, sans-serif;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        .box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            padding: 10px 16px;
            margin: 6px 4px 6px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #007bff;
            color: #fff;
            font-size: 14px;
        }
        button.danger {
            background: #dc3545;
        }
        button.gray {
            background: #6c757d;
        }
        .hidden {
            display: none !important;
        }
        .tip {
            margin: 10px 0;
            color: #333;
            font-size: 14px;
        }
        .item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            margin-bottom: 8px;
        }
        .item h4 {
            font-size: 16px;
            margin-bottom: 4px;
            color: #222;
        }
        .item p {
            font-size: 14px;
            color: #555;
            margin-bottom: 4px;
            white-space: pre-line;
        }
        .item small {
            font-size: 12px;
            color: #999;
        }
        .page-box {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-bar {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="box" id="loginBox">
        <h3>登录</h3>
        <input type="text" id="loginId" placeholder="请输入账号">
        <input type="password" id="loginPwd" placeholder="请输入密码">
        <button onclick="doLogin()">登录</button>
        <div class="tip" id="tip"></div>
    </div>

    <div class="hidden" id="logoutBox">
        <button class="danger" onclick="doLogout()">退出登录</button>
    </div>

    <div class="box hidden" id="mainBox">
        <h3>新增记录</h3>
        <input type="text" id="title" placeholder="标题">
        <input type="text" id="content" placeholder="内容">
        <button onclick="saveItem()">保存这条记录</button>

        <hr style="margin:20px 0">

        <h3>查询记录</h3>
        <div class="search-bar">
            <input type="text" id="searchKey" placeholder="按标题模糊搜索">
            <button onclick="searchByTitle()">搜索标题</button>
            <button class="gray" onclick="loadAllData()">查询全部</button>
        </div>

        <div id="listBox"></div>
        <div class="page-box hidden" id="pageBox">
            <button onclick="prevPage()">上一页</button>
            <span>第 <span id="pageNum">1</span> 页</span>
            <button onclick="nextPage()">下一页</button>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAhksWXChQieWR4Ogs6FR2PuTP3yyjyPdw",
    authDomain: "fir-001-f26d9.firebaseapp.com",
    projectId: "fir-001-f26d9",
    storageBucket: "fir-001-f26d9.firebasestorage.app",
    messagingSenderId: "944028774180",
    appId: "1:944028774180:web:3bf07903a20c52b6120db1"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

const MY_ID = "1816561717";
const MY_PWD = "xxx2351554";

const PAGE_SIZE = 10;
let currentPage = 1;
let totalData = [];

// ====================== 登录 ======================
function doLogin() {
    let id = document.getElementById("loginId").value.trim();
    let pwd = document.getElementById("loginPwd").value.trim();
    if (id === MY_ID && pwd === MY_PWD) {
        localStorage.setItem("logined", "true");
        renderAfterLogin();
    } else {
        document.getElementById("tip").textContent = "账号或密码错误";
    }
}

function doLogout() {
    localStorage.removeItem("logined");
    location.reload();
}

function renderAfterLogin() {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("logoutBox").classList.remove("hidden");
    document.getElementById("mainBox").classList.remove("hidden");
}

window.onload = function () {
    if (localStorage.getItem("logined") === "true") {
        renderAfterLogin();
    }
};

// ====================== 保存 ======================
function saveItem() {
    let title = document.getElementById("title").value.trim();
    let content = document.getElementById("content").value.trim();
    if (!title || !content) return alert("标题和内容不能为空");

    db.collection("items").add({
        userId: MY_ID,
        title: title,
        content: content,
        createTime: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        alert("保存成功");
        document.getElementById("title").value = "";
        document.getElementById("content").value = "";
    });
}

// ====================== ✅ 查询全部（已修复：无索引） ======================
function loadAllData() {
    db.collection("items")
        .where("userId", "==", MY_ID)
        .get({ source: "server" })
        .then(snap => {
            totalData = [];
            snap.forEach(doc => {
                let d = doc.data();
                totalData.push({
                    title: d.title || "",
                    content: d.content || "",
                    createTime: d.createTime || null
                });
            });

            // 前端排序，不依靠 Firestore orderBy → 永远不需要索引
            totalData.sort((a, b) => {
                if (!a.createTime) return 1;
                if (!b.createTime) return -1;
                return b.createTime.seconds - a.createTime.seconds;
            });

            currentPage = 1;
            showPageData();
        });
}

// ====================== 标题搜索 ======================
function searchByTitle() {
    let key = document.getElementById("searchKey").value.trim().toLowerCase();
    if (!key) return alert("请输入关键词");

    db.collection("items")
        .where("userId", "==", MY_ID)
        .get({ source: "server" })
        .then(snap => {
            totalData = [];
            snap.forEach(doc => {
                let d = doc.data();
                if ((d.title || "").toLowerCase().includes(key)) {
                    totalData.push({
                        title: d.title,
                        content: d.content,
                        createTime: d.createTime
                    });
                }
            });

            totalData.sort((a, b) => {
                if (!a.createTime) return 1;
                if (!b.createTime) return -1;
                return b.createTime.seconds - a.createTime.seconds;
            });

            currentPage = 1;
            showPageData();
        });
}

// ====================== 分页展示 ======================
function showPageData() {
    let listBox = document.getElementById("listBox");
    let pageBox = document.getElementById("pageBox");
    let pageNum = document.getElementById("pageNum");

    let start = (currentPage - 1) * PAGE_SIZE;
    let end = start + PAGE_SIZE;
    let pageData = totalData.slice(start, end);

    pageNum.textContent = currentPage;
    pageBox.classList.remove("hidden");

    let html = "";
    if (pageData.length === 0) {
        html = "<p>暂无数据</p>";
    } else {
        pageData.forEach(item => {
            let time = item.createTime
                ? new Date(item.createTime.seconds * 1000).toLocaleString()
                : "无时间";
            html += `
            <div class="item">
                <h4>${item.title}</h4>
                <p>${item.content}</p>
                <small>${time}</small>
            </div>`;
        });
    }
    listBox.innerHTML = html;
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        showPageData();
    }
}

function nextPage() {
    let maxPage = Math.ceil(totalData.length / PAGE_SIZE);
    if (currentPage < maxPage) {
        currentPage++;
        showPageData();
    }
}
</script>

</body>
</html>
